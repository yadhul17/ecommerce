<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AURA | Checkout</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-50">
<main class="min-h-screen py-10 px-4">
<div class="max-w-6xl mx-auto">

<h1 class="text-3xl font-bold mb-6">Checkout</h1>

<div class="grid lg:grid-cols-3 gap-6">

<!-- ================= FORM ================= -->
<section class="lg:col-span-2 bg-white p-6 rounded-xl shadow">

<form method="POST" action="/buy/{{ product.pk }}/" class="space-y-4">
{% csrf_token %}

<!-- Name & Email -->
<div class="grid sm:grid-cols-2 gap-4">
  <input name="name" type="text" placeholder="Full Name" required class="border p-2 rounded">
  <input name="email" type="email" placeholder="Email" required class="border p-2 rounded">
</div>

<!-- Gender -->
<input name="gender" type="text" placeholder="Gender" class="border p-2 rounded w-full">

<!-- State & District -->
<div class="grid sm:grid-cols-2 gap-4">
  <input name="state" type="text" placeholder="State" required class="border p-2 rounded">
  <input name="district" type="text" placeholder="District" required class="border p-2 rounded">
</div>

<!-- Address -->
<textarea name="address" placeholder="Full Address" required class="border p-2 rounded w-full"></textarea>

<!-- Pincode & Landmark -->
<div class="grid sm:grid-cols-2 gap-4">
  <input name="pincode" type="text" placeholder="Pincode" required class="border p-2 rounded">
  <input name="landmark" type="text" placeholder="Landmark" class="border p-2 rounded">
</div>

<!-- Quantity -->
<input name="quantity" type="number" min="1" required placeholder="Quantity"
       class="border p-2 rounded w-full">

<!-- Hidden Order Dates -->
<input type="hidden" name="odate" value="{{ today }}">
<input type="hidden" name="ddate" value="{{ fdate }}">

<!-- Payment Mode -->
<div class="space-y-2">
  <label class="block font-semibold">Payment Method</label>

  <label class="flex items-center gap-2">
    <input type="radio" name="payment_mode" value="COD" checked>
    Cash On Delivery
  </label>

 

  <label class="flex items-center gap-2">
    <input type="radio" name="payment_mode" value="UPI">
    UPI
  </label>
</div>

<button type="submit"
class="bg-black text-white w-full py-3 rounded-lg mt-4">
Place Order
</button>

</form>
</section>

<!-- ================= SUMMARY ================= -->
<aside class="bg-white p-6 rounded-xl shadow">

<img src="{{ product.img.url }}" class="w-40 h-40 object-cover rounded mb-4">

<h2 class="text-xl font-semibold">{{ product.name }}</h2>
<p class="text-gray-600">₹ {{ product.price }}</p>

<div class="mt-4 border-t pt-4">
  <p>Stock: <strong>{{ details.stock }}</strong></p>
</div>

</aside>

</div>
</div>
</main>
</body>
</html>
