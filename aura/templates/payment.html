<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment - Razorpay</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full bg-white shadow-lg rounded-xl p-8">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-900">Checkout</h2>
            <p class="text-gray-500">Order #{{ order_obj.id }}</p>
        </div>

        <div class="space-y-4 mb-8">
            <div class="flex justify-between text-lg">
                <span class="text-gray-600">Customer:</span>
                <span class="font-semibold text-gray-800">{{ order_name }}</span>
            </div>
            <div class="flex justify-between text-2xl border-t pt-4">
                <span class="font-bold text-gray-900">Total Amount:</span>
                <span class="font-bold text-indigo-600">₹{{ order_amount }}</span>
            </div>
        </div>

        {% if razorpay_order_id %}
            <button id="rzp-button1" class="w-full bg-indigo-600 text-white font-bold py-4 px-6 rounded-lg hover:bg-indigo-700 transition duration-300 flex items-center justify-center shadow-lg">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                Pay with Razorpay
            </button>
        {% else %}
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="w-full bg-gray-900 text-white font-bold py-4 px-6 rounded-lg hover:bg-black transition duration-300">
                    Confirm & Proceed to Pay
                </button>
            </form>
        {% endif %}

        <div class="mt-6 text-center">
            <p class="text-xs text-gray-400">Secure payment powered by Razorpay</p>
        </div>
    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        {% if razorpay_order_id %}
        var options = {
            "key": "{{ razorpay_key }}", 
            "amount": "{{ order_amount|add:"0" }}00", // Amount in paise
            "currency": "INR",
            "name": "Perfume Store",
            "description": "Payment for Order #{{ order_obj.id }}",
            "order_id": "{{ razorpay_order_id }}",
            "callback_url": "{{ callback_url }}", // Your Django callback view
            "prefill": {
                "name": "{{ order_name }}",
                "email": "{{ request.user.email }}",
            },
            "theme": {
                "color": "#4F46E5"
            }
        };
        var rzp1 = new Razorpay(options);
        document.getElementById('rzp-button1').onclick = function(e){
            rzp1.open();
            e.preventDefault();
        }
        {% endif %}
    </script>
</body>
</html>
